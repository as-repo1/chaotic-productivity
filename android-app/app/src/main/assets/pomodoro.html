<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - Chaotic Productivity</title>
    <!-- Inject Theme script before CSS to prevent styling flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('productivity-theme') || 'nord';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="pomodoro.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .standalone-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            width: 100%;
        }
        .back-link {
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color var(--transition-speed);
        }
        .back-link:hover {
            color: var(--accent-hover);
        }
    </style>
</head>
<body>

<div class="standalone-container">
    <div class="header-actions">
        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back to Dashboard
        </a>
        <h2 style="font-size: 1.25rem; font-weight: 600; margin: 0; color: var(--text-secondary);">Minimal Focus Mode</h2>
    </div>

    <div class="timer-section-layout">
        <div class="glass-card main-timer-card">
            <h2 class="section-heading">Pomodoro Timer</h2>
            
            <div class="pomodoro-timer">
                <div class="timer-circle-container">
                    <div class="timer-glow"></div>
                    <svg class="progress-ring" viewBox="0 0 240 240" width="240" height="240">
                        <circle class="progress-ring-bg" stroke="var(--bg-tertiary)" stroke-width="8" fill="transparent" r="108" cx="120" cy="120" />
                        <circle class="progress-ring-fg" stroke="var(--accent-color)" stroke-width="8" stroke-dasharray="678.6" stroke-dashoffset="0" fill="transparent" r="108" cx="120" cy="120" stroke-linecap="round" />
                    </svg>
                    <div class="timer-display">
                        <div class="time-readout" id="pomodoro-time">25:00</div>
                        <div class="session-counter" id="pomodoro-status">Focus Session</div>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-success" id="pomodoro-start">Start</button>
                    <button class="btn btn-warning" id="pomodoro-pause" disabled>Pause</button>
                    <button class="btn btn-danger" id="pomodoro-reset">Reset</button>
                </div>

                <!-- Presets -->
                <div class="pomodoro-presets">
                    <button class="btn btn-preset active" data-duration="25" data-mode="focus">Pomodoro</button>
                    <button class="btn btn-preset" data-duration="5" data-mode="short">Short Break</button>
                    <button class="btn btn-preset" data-duration="15" data-mode="long">Long Break</button>
                </div>

                <div class="settings">
                    <label for="timer-slider" class="slider-label">Custom Duration: <span id="slider-val">25</span> min</label>
                    <input type="range" id="timer-slider" min="1" max="60" step="1" value="25">
                </div>
            </div>
        </div>

        <div class="glass-card notes-card">
            <h3>Focus Session Log</h3>
            <p class="card-subtitle">Take notes of what you achieve in this block</p>
            <textarea class="textarea-field" id="session-notes" placeholder="Write down notes, items completed, or thoughts..."></textarea>
            <button class="btn btn-primary" id="save-notes-btn">Save to Focus Log</button>
            
            <div class="notes-log-list" id="focus-history">
                <!-- Log entries load dynamically -->
            </div>
        </div>
    </div>
</div>

<script src="pomodoro.js"></script>
</body>
</html>
